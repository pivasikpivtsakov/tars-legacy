services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${RDS_USERNAME:-app}
      POSTGRES_PASSWORD: ${RDS_PASSWORD:-app}
      POSTGRES_DB: ${RDS_DB_NAME:-app}
    volumes:
      # Postgres 18+ stores data under $PGDATA = /var/lib/postgresql/<MAJOR>/docker,
      # so the volume mount target is /var/lib/postgresql (not /data).
      # See docker-library/postgres#1259.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RDS_USERNAME:-app} -d ${RDS_DB_NAME:-app}"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "${RDS_PORT:-5433}:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"

#env_file:
#      - .env
# todo: limits cpu/mem
